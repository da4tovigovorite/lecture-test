<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        body { background: #000; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; h-screen; object-fit: cover; }
        .content-section { height: 200vh; position: relative; pointer-events: none; }
        .text-block { 
            position: fixed; opacity: 0; width: 80%;
            font-family: 'Instrument Serif', serif;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <!-- Контейнер для видео -->
    <video id="v0" class="fixed top-0 left-0 w-full h-screen object-cover" 
           src="https://res.cloudinary.com/dcbvfik8m/video/upload/v1777796888/test_bgibi2.mp4" 
           muted playsinline preload="auto"></video>

    <!-- Скролл-контейнер -->
    <main class="relative z-10">
        <section class="content-section"></section>
        <section class="content-section"></section>
        <section class="content-section"></section>
    </main>

    <!-- Текстовые блоки -->
    <div id="text1" class="text-block bottom-10 right-5 text-right text-4xl text-white">First Chapter: The Descent</div>
    <div id="text2" class="text-block top-1/2 left-5 -translate-y-1/2 text-left text-4xl text-white">Second Chapter: The Inner Mirror</div>
    <div id="text3" class="text-block top-20 left-5 text-left text-4xl text-white">Final Chapter: The Resolution</div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const video = document.querySelector("#v0");

        // Ждем загрузки метаданных, чтобы знать длину видео
        video.onloadedmetadata = function() {
            const tl = gsap.timeline({
                defaults: { duration: 1 },
                scrollTrigger: {
                    trigger: "main",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5, // Вот тут магия плавности (задержка в 1.5 сек для мягкости)
                }
            });

            // Синхронизация видео
            tl.fromTo(video, { currentTime: 0 }, { currentTime: video.duration || 6 }, 0);

            // Анимация текста 1 (0-2 сек)
            tl.to("#text1", { opacity: 1, y: -20 }, 0.1)
              .to("#text1", { opacity: 0, y: -50 }, 0.8);

            // Анимация текста 2 (2-4 сек)
            tl.to("#text2", { opacity: 1, y: -20 }, 1.2)
              .to("#text2", { opacity: 0, y: -50 }, 1.8);

            // Анимация текста 3 (4-6 сек)
            tl.to("#text3", { opacity: 1, y: -20 }, 2.2);
        };

        // Принудительный фикс для мобилок: видео не играет само, но подгружается
        video.load();
    </script>
</body>
</html>
